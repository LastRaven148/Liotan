add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self' 'wasm-unsafe-eval'; script-src-attr 'none'; style-src 'self'; style-src-attr 'none'; img-src 'self' data: blob: https://media.liotan.com https://media.liotan.ru; media-src 'self' blob:; connect-src 'self' https://api.liotan.com https://api.liotan.ru https://api-tunnel.liotan.com wss://api.liotan.com wss://api.liotan.ru wss://api-tunnel.liotan.com; worker-src 'self'; form-action 'self'" always;
add_header Referrer-Policy "no-referrer" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Permissions-Policy "camera=(), microphone=(self), geolocation=(), payment=(), usb=(), bluetooth=()" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
