# Liotan Tunnel-era Nginx baseline.
#
# Current production traffic should enter through Cloudflare Tunnel:
#   liotan.com / www.liotan.com / liotan.ru       -> http://127.0.0.1:8080
#   api.liotan.com / api.liotan.ru                -> http://127.0.0.1:3001
#
# Do not reintroduce public API virtual hosts such as api-direct.liotan.com.
# Do not expose Node.js on 0.0.0.0:3001.
# Do not use this file to reopen public 80/443 origin traffic.
#
# This file is intentionally a safe local-origin template only.

server {
    listen 127.0.0.1:8080;
    server_name tunnel.liotan.com liotan.com www.liotan.com liotan.ru www.liotan.ru;

    root /var/www/liotan;
    index index.html;

    client_max_body_size 120m;

    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self' 'wasm-unsafe-eval'; script-src-attr 'none'; style-src 'self'; style-src-attr 'unsafe-inline'; img-src 'self' data: blob: https://media.liotan.com https://media.liotan.ru; media-src 'self' blob:; connect-src 'self' https://api.liotan.com https://api.liotan.ru https://api-tunnel.liotan.com wss://api.liotan.com wss://api.liotan.ru wss://api-tunnel.liotan.com; worker-src 'self'; form-action 'self'" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=(), payment=(), usb=(), bluetooth=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    location ~* \.wasm$ {
        default_type application/wasm;
        expires 365d;
        try_files $uri =404;
    }

    location /assets/ {
        expires 365d;
        try_files $uri =404;
    }

    location = /index.html {
        expires -1;
        try_files $uri =404;
    }

    location / {
        try_files $uri /index.html;
    }
}
