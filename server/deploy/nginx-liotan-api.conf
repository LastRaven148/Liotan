# Liotan Tunnel-era Nginx baseline.
#
# Current production traffic should enter through Cloudflare Tunnel:
#   liotan.com / www.liotan.com / liotan.ru       -> http://127.0.0.1:8080
#   api.liotan.com / api.liotan.ru                -> http://127.0.0.1:3001
#
# Do not reintroduce public API virtual hosts such as api-direct.liotan.com.
# Do not expose Node.js on 0.0.0.0:3001.
# Do not use this file to reopen public 80/443 origin traffic.
#
# This file is intentionally a safe local-origin template only.

server {
    listen 127.0.0.1:8080;
    server_name tunnel.liotan.com liotan.com www.liotan.com liotan.ru www.liotan.ru;

    root /var/www/liotan;
    index index.html;

    client_max_body_size 120m;

    include /etc/nginx/snippets/liotan-security-headers.conf;

    location ~* ^/assets/.*\.wasm$ {
        include /etc/nginx/snippets/liotan-security-headers.conf;
        default_type application/wasm;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location ~* ^/assets/.*\.js$ {
        include /etc/nginx/snippets/liotan-security-headers.conf;
        default_type application/javascript;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location ~* ^/assets/.*\.css$ {
        include /etc/nginx/snippets/liotan-security-headers.conf;
        default_type text/css;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location = /index.html {
        include /etc/nginx/snippets/liotan-security-headers.conf;
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    location = /manifest.json {
        include /etc/nginx/snippets/liotan-security-headers.conf;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files $uri =404;
    }

    location ~* \.(?:js|css|wasm|map|json)$ {
        try_files $uri =404;
    }

    location / {
        include /etc/nginx/snippets/liotan-security-headers.conf;
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri /index.html;
    }
}
