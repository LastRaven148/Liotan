version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule: { interval: weekly }
    cooldown: { default-days: 7 }
    open-pull-requests-limit: 5
    versioning-strategy: increase-if-necessary
  - package-ecosystem: npm
    directory: /client
    schedule: { interval: weekly }
    cooldown: { default-days: 7 }
    open-pull-requests-limit: 5
    versioning-strategy: increase-if-necessary
  - package-ecosystem: npm
    directory: /server
    schedule: { interval: weekly }
    cooldown: { default-days: 7 }
    open-pull-requests-limit: 5
    versioning-strategy: increase-if-necessary
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly }
    open-pull-requests-limit: 5
