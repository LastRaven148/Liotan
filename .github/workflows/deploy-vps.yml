name: Deploy production

on:
  workflow_dispatch:
    inputs:
      release_sha:
        description: Exact main commit SHA with a successful CI release gate
        required: true
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: production

    steps:
      - name: Resolve successful main CI evidence
        id: evidence
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ inputs.release_sha }}
        run: |
          [[ "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]]
          RUN_ID=$(gh api "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs?branch=main&status=success&per_page=100" \
            --jq "[.workflow_runs[] | select(.head_sha == \"$RELEASE_SHA\")][0].id // empty")
          test -n "$RUN_ID"
          printf 'run_id=%s\n' "$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Check out attested revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.release_sha }}

      - name: Download CI release evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-evidence-${{ inputs.release_sha }}
          path: release-evidence
          run-id: ${{ steps.evidence.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Configure SSH host verification
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_HOST_KEY: ${{ secrets.VPS_HOST_KEY }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_ROOT: ${{ vars.DEPLOY_ROOT }}
          PM2_PROCESS: ${{ vars.PM2_PROCESS }}
          HEALTH_URL: ${{ vars.HEALTH_URL }}
          FRONTEND_SMOKE_URL: ${{ vars.FRONTEND_SMOKE_URL }}
          FRONTEND_HOST: ${{ vars.FRONTEND_HOST }}
          PUBLIC_FRONTEND_LINK: ${{ vars.PUBLIC_FRONTEND_LINK }}
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_HOST_KEY"
          test -n "$VPS_SSH_KEY"
          test -n "$VPS_USER"
          test -n "$DEPLOY_ROOT"
          test -n "$PM2_PROCESS"
          test -n "$HEALTH_URL"
          test -n "$FRONTEND_SMOKE_URL"
          test -n "$FRONTEND_HOST"
          test -n "$PUBLIC_FRONTEND_LINK"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s %s\n' "$VPS_HOST" "$VPS_HOST_KEY" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload and atomically activate release
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_ROOT: ${{ vars.DEPLOY_ROOT }}
          PM2_PROCESS: ${{ vars.PM2_PROCESS }}
          HEALTH_URL: ${{ vars.HEALTH_URL }}
          FRONTEND_SMOKE_URL: ${{ vars.FRONTEND_SMOKE_URL }}
          FRONTEND_HOST: ${{ vars.FRONTEND_HOST }}
          PUBLIC_FRONTEND_LINK: ${{ vars.PUBLIC_FRONTEND_LINK }}
        run: |
          BUNDLE=$(find release-evidence -name '*-deploy.tar.gz' -type f -print -quit)
          test -n "$BUNDLE"
          REMOTE_BUNDLE="/tmp/liotan-${{ inputs.release_sha }}.tar.gz"
          scp -i ~/.ssh/id_ed25519 "$BUNDLE" "$VPS_USER@$VPS_HOST:$REMOTE_BUNDLE"
          ssh -i ~/.ssh/id_ed25519 "$VPS_USER@$VPS_HOST" \
            "bash -s -- '$REMOTE_BUNDLE' '$DEPLOY_ROOT' '$PM2_PROCESS' '$HEALTH_URL' '${{ inputs.release_sha }}' '$FRONTEND_SMOKE_URL' '$FRONTEND_HOST' '$PUBLIC_FRONTEND_LINK'" \
            < server/deploy/install-release.sh
