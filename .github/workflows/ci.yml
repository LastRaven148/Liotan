name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Release gate (Node 22)
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble@sha256:5b8f294aff9041b7191c34a4bab3ac270157a28774d4b0660e9743297b697e48
      options: --ipc=host
    defaults:
      run:
        shell: bash
    env:
      CI: "true"
      MONGOMS_VERSION: "8.0.14"
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      LIOTAN_SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      VITE_KEY_TRANSPARENCY_PUBLIC_KEY: ${{ vars.KEY_TRANSPARENCY_PUBLIC_KEY }}
    steps:
      - name: Check out exact revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Trust the exact container workspace
        env:
          HOME: /root
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json

      - name: Verify synchronized release version
        run: npm run version:check

      - name: Verify production version increased
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: node scripts/versionProduction.js --check "$BASE_SHA"

      - name: Install locked dependencies
        run: |
          npm ci
          npm ci --prefix client
          npm ci --prefix server

      - name: Verify pinned browser runtime
        env:
          HOME: /root
        run: |
          node <<'NODE'
          const fs = require("fs");
          const { chromium, firefox, webkit } = require("@playwright/test");

          (async () => {
            for (const browserType of [chromium, firefox, webkit]) {
              const executable = browserType.executablePath();
              if (!fs.existsSync(executable)) {
                throw new Error(`Pinned Playwright runtime is missing: ${executable}`);
              }

              const browser = await browserType.launch({ headless: true });
              await browser.close();
            }
          })().catch(error => {
            console.error(error);
            process.exitCode = 1;
          });
          NODE

      - name: Run complete release gate
        env:
          HOME: /root
        run: npm run release:check

      - name: Build immutable deployment bundle
        env:
          HOME: /root
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "push" && "$GITHUB_REF" == "refs/heads/main" ]]; then
            [[ "$VITE_KEY_TRANSPARENCY_PUBLIC_KEY" =~ ^[A-Za-z0-9_-]{43}$ ]]
          fi
          VERSION=$(node -p "require('./package.json').version")
          npm run test:deployment-bundle
          test -f client/build/index.html
          find client/build/assets -maxdepth 1 -type f -name '*.js' -print -quit | grep -q .
          find client/build/assets -maxdepth 1 -type f -name '*.wasm' -print -quit | grep -q .
          BUNDLE="release/Liotan-${VERSION}-deploy.tar.gz"
          FIRST_BUNDLE=$(mktemp)
          MANIFEST="DEPLOYMENT-MANIFEST.json"
          trap 'rm -f "$FIRST_BUNDLE" "$MANIFEST"' EXIT
          node - "$MANIFEST" "$VERSION" "$LIOTAN_SOURCE_SHA" <<'NODE'
          const fs = require("node:fs");
          const [output, version, sourceSha] = process.argv.slice(2);
          if (!/^[0-9a-f]{40}$/.test(sourceSha)) throw new Error("invalid source revision");
          fs.writeFileSync(output, `${JSON.stringify({
            schema: "liotan-deployment/v1",
            version,
            sourceSha
          }, null, 2)}\n`);
          NODE
          build_bundle() {
            tar --sort=name --mtime='UTC 2000-01-01' --owner=0 --group=0 --numeric-owner \
              --exclude='server/node_modules' --exclude='server/test' --exclude='server/.env*' \
              -czf "$1" server client/build LICENSE THIRD-PARTY-NOTICES.md "$MANIFEST"
          }
          build_bundle "$FIRST_BUNDLE"
          build_bundle "$BUNDLE"
          cmp --silent "$FIRST_BUNDLE" "$BUNDLE"
          rm -f "$FIRST_BUNDLE" "$MANIFEST"
          trap - EXIT

      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-evidence-${{ env.LIOTAN_SOURCE_SHA }}
          if-no-files-found: error
          retention-days: 30
          path: |
            release/*.zip
            release/*.sha256
            release/*-deploy.tar.gz
            artifacts/sbom/*.json
            artifacts/licenses/*.json
            coverage/coverage-summary.json
            test-results/

  attest:
    name: Attest immutable release evidence
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download exact release evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-evidence-${{ github.sha }}
          path: release-evidence

      - name: Attest release provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            release-evidence/release/*.zip
            release-evidence/release/*.sha256
            release-evidence/release/*-deploy.tar.gz
