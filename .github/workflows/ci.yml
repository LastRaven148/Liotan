name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Release gate (Node 22)
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble@sha256:5b8f294aff9041b7191c34a4bab3ac270157a28774d4b0660e9743297b697e48
      options: --ipc=host
    defaults:
      run:
        shell: bash
    env:
      CI: "true"
      MONGOMS_VERSION: "8.0.14"
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    steps:
      - name: Check out exact revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json

      - name: Install locked dependencies
        run: |
          npm ci
          npm ci --prefix client
          npm ci --prefix server

      - name: Verify pinned browser runtime
        env:
          HOME: /root
        run: |
          node <<'NODE'
          const fs = require("fs");
          const { chromium, firefox, webkit } = require("@playwright/test");

          (async () => {
            for (const browserType of [chromium, firefox, webkit]) {
              const executable = browserType.executablePath();
              if (!fs.existsSync(executable)) {
                throw new Error(`Pinned Playwright runtime is missing: ${executable}`);
              }

              const browser = await browserType.launch({ headless: true });
              await browser.close();
            }
          })().catch(error => {
            console.error(error);
            process.exitCode = 1;
          });
          NODE

      - name: Run complete release gate
        env:
          HOME: /root
        run: npm run release:check

      - name: Build immutable deployment bundle
        run: |
          VERSION=$(node -p "require('./package.json').version")
          npm run test:deployment-bundle
          test -f client/build/index.html
          find client/build/assets -maxdepth 1 -type f -name '*.js' -print -quit | grep -q .
          find client/build/assets -maxdepth 1 -type f -name '*.wasm' -print -quit | grep -q .
          BUNDLE="release/Liotan-${VERSION}-deploy.tar.gz"
          FIRST_BUNDLE=$(mktemp)
          build_bundle() {
            tar --sort=name --mtime='UTC 2000-01-01' --owner=0 --group=0 --numeric-owner \
              --exclude='server/node_modules' --exclude='server/test' --exclude='server/.env*' \
              -czf "$1" server client/build LICENSE THIRD-PARTY-NOTICES.md
          }
          build_bundle "$FIRST_BUNDLE"
          build_bundle "$BUNDLE"
          cmp --silent "$FIRST_BUNDLE" "$BUNDLE"
          rm -f "$FIRST_BUNDLE"

      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-evidence-${{ github.sha }}
          if-no-files-found: error
          retention-days: 30
          path: |
            release/*.zip
            release/*.sha256
            release/*-deploy.tar.gz
            artifacts/sbom/*.json
            artifacts/licenses/*.json
            coverage/coverage-summary.json
            test-results/

      - name: Attest release provenance
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            release/*.zip
            release/*.sha256
            release/*-deploy.tar.gz
