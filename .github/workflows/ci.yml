name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Release gate (Node 22)
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    env:
      CI: "true"
      MONGOMS_VERSION: "8.0.14"
    steps:
      - name: Check out exact revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json

      - name: Install locked dependencies
        run: |
          npm ci
          npm ci --prefix client
          npm ci --prefix server

      - name: Install browser runtime
        run: npx playwright install --with-deps chromium

      - name: Run complete release gate
        run: npm run release:check

      - name: Build immutable deployment bundle
        if: github.event_name != 'pull_request'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          tar --exclude='server/node_modules' --exclude='server/test' --exclude='server/.env*' \
            -czf "release/Liotan-${VERSION}-deploy.tar.gz" server client/build LICENSE THIRD-PARTY-NOTICES.md

      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-evidence-${{ github.sha }}
          if-no-files-found: error
          retention-days: 30
          path: |
            release/*.zip
            release/*.sha256
            release/*-deploy.tar.gz
            artifacts/sbom/*.json
            artifacts/licenses/*.json
            coverage/coverage-summary.json
            test-results/

      - name: Attest release provenance
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            release/*.zip
            release/*.sha256
            release/*-deploy.tar.gz
